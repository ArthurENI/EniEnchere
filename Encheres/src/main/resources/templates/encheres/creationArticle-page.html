<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" lang="en"
      layout:decorate="~{layout/base}">
<body>
<div layout:fragment="content">
    <div class="uk-container uk-margin-large-top">

        <h2 class="uk-heading-divider">Créer une nouvelle vente</h2>

        <form class="uk-form-stacked"
              action="/articles/ventes"
              method="post"
              th:object="${article}">

            <div class="uk-grid-large" uk-grid>

                <!-- Image -->
                <div class="uk-width-1-3">
                    <div class="uk-placeholder uk-text-center">
                        <span uk-icon="icon: image; ratio: 3"></span>
                        <p>Image de l'article</p>
                    </div>
                </div>

                <!-- Champs principaux -->
                <div class="uk-width-2-3">

                    <div class="uk-margin">
                        <label class="uk-form-label">Article :</label>
                        <div class="uk-form-controls">
                            <input class="uk-input" type="text" placeholder="Nom de l'article"
                            th:field="*{nomArticle}" th:classappend="${#fields.hasErrors('nomArticle')} ? ' uk-form-danger' : ''">
                        </div>
                    </div>

                    <div class="uk-margin">
                        <label class="uk-form-label">Description :</label>
                        <div class="uk-form-controls">
                            <textarea class="uk-textarea" rows="4" placeholder="Description de l'article"
                            th:field="*{description}" th:classappend="${#fields.hasErrors('description')} ? ' uk-form-danger' : ''"></textarea>
                        </div>
                    </div>

                    <div class="uk-margin">
                        <label class="uk-form-label">Catégorie :</label>
                        <div class="uk-form-controls">
                            <select class="uk-select" th:field="${article.categorie}">
                                <option th:each="c : ${categorie}" th:value="${c.noCategorie}"
                                        th:text="${c.libelle}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="uk-margin">
                        <label class="uk-form-label">Photo de l'article :</label>
                        <div class="uk-form-controls">
                            <input class="uk-input" type="file">
                        </div>
                    </div>

                    <div class="uk-margin">
                        <label class="uk-form-label">Mise à prix :</label>
                        <div class="uk-form-controls">
                            <input class="uk-input uk-width-small" type="number" value="150"
                                   th:field="*{miseAPrix}"
                                   th:classappend="${#fields.hasErrors('miseAPrix')} ? ' uk-form-danger' : ''">
                        </div>
                    </div>

                    <div class="uk-grid-small" uk-grid>
                        <div class="uk-width-1-2">
                            <label class="uk-form-label">Début de l'enchère :</label>
                            <input class="uk-input" type="date"
                                   th:field="*{dateDebutEnchere}"
                                   th:classappend="${#fields.hasErrors('dateDebutEnchere')} ? ' uk-form-danger' : ''">
                        </div>

                        <div class="uk-width-1-2">
                            <label class="uk-form-label">Fin de l'enchère :</label>
                            <input class="uk-input" type="date"
                                   th:field="*{dateFinEnchere}"
                                   th:classappend="${#fields.hasErrors('dateFinEnchere')} ? ' uk-form-danger' : ''">
                        </div>
                    </div>

                </div>
            </div>

           <!-- &lt;!&ndash; Retrait &ndash;&gt;
            <fieldset class="uk-fieldset uk-margin-large-top">
                <legend class="uk-legend">Retrait</legend>

                <div class="uk-grid-small" uk-grid>
                    <div class="uk-width-1-1">
                        <label class="uk-form-label">Rue :</label>
                        <input class="uk-input" type="text" value=""
                               th:field="*{adresseRetrait.rue}"
                               th:classappend="${#fields.hasErrors('rue')} ? ' uk-form-danger' : ''">
                    </div>

                    <div class="uk-width-1-3">
                        <label class="uk-form-label">Code postal :</label>
                        <input class="uk-input" type="text" value=""
                               th:field="*{adresseRetrait.codePostal}"
                               th:classappend="${#fields.hasErrors('codePostal')} ? ' uk-form-danger' : ''">
                    </div>

                    <div class="uk-width-2-3">
                        <label class="uk-form-label">Ville :</label>
                        <input class="uk-input" type="text" value=""
                               th:field="*{adresseRetrait.ville}"
                               th:classappend="${#fields.hasErrors('ville')} ? ' uk-form-danger' : ''">
                    </div>
                </div>
            </fieldset>-->

            <!-- Boutons -->
            <div class="uk-margin-large-top uk-flex uk-flex-between">
                <div class="uk-width-1-2">
                    <a class="uk-button uk-button-default uk-width-1-2 uk-align-center" href="/articles/encheres">Retour</a>
                </div>
                <div class="uk-width-1-2">
                    <input type="submit" class="uk-button uk-button-primary uk-width-1-2 uk-align-center" value="Valider">
                </div>
            </div>

        </form>

    </div>
</div>

</body>
</html>
