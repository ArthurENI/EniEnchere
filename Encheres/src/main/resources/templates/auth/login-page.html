<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" lang="en"
      layout:decorate="~{layout/base}">
<body>

<div layout:fragment="content">

    <div class="uk-flex uk-flex-center uk-flex-middle">

        <div class="uk-width-medium uk-padding-small">
            <h1>Se connecter</h1>


            <!-- login -->
            <form class="toggle-class" action="/encheres/login-process" method="post" th:object="${utilisateur}">
                <fieldset class="uk-fieldset">
                    <div class="uk-margin-small">
                        <div class="uk-inline uk-width-1-1">
                            <span class="uk-form-icon uk-form-icon-flip" data-uk-icon="icon: user"></span>
                            <label>
                                <input class="uk-input uk-border-pill"
                                       th:placeholder="pseudo"
                                       th:field="*{pseudo}"
                                       type="text">
                            </label>
                            <div class="uk-text-danger"
                                 th:if="${#fields.hasErrors('pseudo')}"
                                 th:errors="*{pseudo}"></div>
                        </div>
                    </div>
                    <div class="uk-margin-small">
                        <div class="uk-inline uk-width-1-1">
                            <span class="uk-form-icon uk-form-icon-flip" data-uk-icon="icon: lock"></span>
                            <label>
                                <input class="uk-input uk-border-pill"
                                       th:placeholder="password"
                                       th:field="*{motDePasse}"
                                       type="password">
                            </label>
                            <div class="uk-text-danger" th:if="${#fields.hasErrors('motDePasse')}"
                                 th:errors="*{motDePasse}"></div>
                        </div>
                    </div>
                    <div th:if="${errorMessage}" class="uk-alert-danger uk-alert">
                        <p th:text="${errorMessage}"></p>
                    </div>
                    <div class="uk-margin-small">
                        <label>
                            <input class="uk-checkbox" type="checkbox">
                            Se souvenir de moi
                        </label>
                    </div>
                    <div class="uk-margin-bottom">
                        <button type="submit"
                                class="uk-button uk-button-primary uk-border-pill uk-width-1-1">
                            Connexion
                        </button>
                    </div>

                </fieldset>
            </form>

            <!-- /login -->

            <!-- recover password -->
            <form class="toggle-class" action="/encheres/ChgProcess" th:object="${emailForm}"  method="post" hidden>
                <div class="uk-margin-small">
                    <div class="uk-inline uk-width-1-1">
                        <span class="uk-form-icon uk-form-icon-flip" data-uk-icon="icon: mail"></span>
                        <label>
                            <input class="uk-input uk-border-pill"
                                   th:placeholder="email"
                                   th:field="*{email}"
                                   required type="email">
                        </label>
                    </div>
                </div>
                <div class="uk-margin-bottom">
                    <button type="submit"
                            class="uk-button uk-button-primary uk-border-pill uk-width-1-1">
                        Changer mot de passe
                    </button>

                </div>
            </form>
            <!-- /recover password -->

            <!-- action buttons -->
            <div>
                <div class="uk-text-center">
                    <a class="uk-link-reset uk-text-small toggle-class"
                       data-uk-toggle="target: .toggle-class ;animation: uk-animation-fade">
                        Mot de passe oublié
                    </a>
                    <a class="uk-link-reset uk-text-small toggle-class"
                       data-uk-toggle="target: .toggle-class ;animation: uk-animation-fade"
                       hidden>
                        <span data-uk-icon="arrow-left"></span>
                        Retour
                    </a>
                    <br>
                    <a class="uk-link-reset uk-text-small toggle-class" href="/encheres/inscription">
                        Créer un compte
                    </a>

                </div>

            </div>
            <!-- action buttons -->
        </div>
    </div>
</div>

</body>
</html>
