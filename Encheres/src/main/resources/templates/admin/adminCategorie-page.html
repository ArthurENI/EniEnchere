<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" lang="en"
      layout:decorate="~{layout/base}">
<body>
<div layout:fragment="content" class="uk-section uk-section-small">
    <div class="uk-container">

        <h1 class="uk-heading-line uk-text-center"><span>Liste des categories</span></h1>

        <ul class="uk-list uk-list-divider">
            <li class="uk-flex uk-flex-between uk-flex-middle uk-padding-small">
                <form class="uk-form-horizontal uk-flex uk-flex-middle uk-grid-small"
                      uk-grid
                      method="post"
                      th:action="@{/encheres/admin/addCat}">

                    <div class="uk-width-expand">
                        <input class="uk-input" id="newCat" type="text" name="newCat">
                    </div>

                    <div>
                        <button type="submit"
                                class="uk-button uk-button-primary uk-border-pill">
                            <span data-uk-icon="icon: plus"></span>
                        </button>
                    </div>

                </form>
            </li>
            <li th:each="categorie : ${categories}"
                class="uk-flex uk-flex-between uk-flex-middle uk-padding-small">
                <!-- Info categories -->
                <div>
                    <span th:text="${categorie.getLibelle()}"></span>
                    <form th:object="${cat}" method="post"
                          th:action="@{/encheres/admin/modifCat/{id}(id=${categorie.noCategorie})}">
                        <input type="text" th:field="*{libelle}">

                        <button type="submit" class="uk-button uk-button-primary uk-button-small">Modifier</button>
                    </form>

                </div>
                <!-- Actions -->
                <div class="uk-flex uk-flex-right uk-gap-small">
                    <a class="uk-button uk-button-danger uk-button-small"
                       th:href="@{/encheres/admin/supprCat/{id}(id=${categorie.getNoCategorie()})}">Supprimer</a>
                </div>

            </li>
        </ul>
        <div th:if="${errorMessage}" class="uk-alert-danger uk-alert">
            <p th:text="${errorMessage}"></p>
        </div>
    </div>
</div>
</body>
</html>
